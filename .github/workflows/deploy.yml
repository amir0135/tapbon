# Deploys to Azure App Service (Linux) on push to main.
# Prerequisites (Phase 0, once):
#   1. Create Azure resources: rg-tapbon-prod → App Service (Node 22 LTS, Linux),
#      Postgres Flexible Server (Sweden Central), Blob Storage, Key Vault.
#   2. In the App Service: Deployment Center → get the publish profile,
#      save it as the repo secret AZURE_WEBAPP_PUBLISH_PROFILE.
#   3. Set AZURE_WEBAPP_NAME below.
#   4. App settings on the App Service: POSTGRES_URL, AUTH_SECRET, BASE_URL,
#      STRIPE_* (Phase 6) — pull secrets from Key Vault references.

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: tapbon-app
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # hoisted = flat real-file node_modules; pnpm's default symlink layout
        # breaks when Kudu re-packs node_modules on App Service
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Build
        # Build-time placeholders only — real values come from App Service settings at runtime
        env:
          POSTGRES_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: build-time-placeholder-secret
          BASE_URL: https://tapbon-app.azurewebsites.net
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
        run: pnpm build

      - name: Package for deployment
        # Standalone output: self-contained server.js + traced node_modules
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          cp -r messages .next/standalone/messages
          cd .next/standalone && zip -r ../../deploy.zip . -q

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
